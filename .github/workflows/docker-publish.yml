name: docker-publish

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute short sha
        id: vars
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.prod
          push: true
          tags: |
            ghcr.io/citrus171/wp-miyaoo:latest
            ghcr.io/citrus171/wp-miyaoo:sha-${{ steps.vars.outputs.short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update kustomization.yaml
        run: |
          sed -i "s|newTag:.*|newTag: sha-${{ steps.vars.outputs.short }}|" \
            deploy/k8s/overlays/prod/kustomization.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deploy/k8s/overlays/prod/kustomization.yaml
          git diff --cached --quiet || git commit -m "deploy: update image tag to sha-${{ steps.vars.outputs.short }}"
          git push
