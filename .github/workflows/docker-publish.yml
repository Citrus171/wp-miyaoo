# main push → GHCR へ push → ArgoCD Image Updater が sha- タグを検知 → 自動デプロイ
name: docker-publish

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute short sha
        id: vars
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.prod
          push: true
          tags: |
            ghcr.io/citrus171/wp-miyaoo:latest
            ghcr.io/citrus171/wp-miyaoo:sha-${{ steps.vars.outputs.short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
