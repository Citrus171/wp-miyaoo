# このファイルはテンプレート。実際のSecretはgit管理外でVPSに手動適用する:
#   cp secret.example.yaml secret.yaml
#   nano secret.yaml  # REPLACE_ME を実際の値に変更
#   kubectl apply -f secret.yaml -n blog-miyaoo
#   rm secret.yaml
apiVersion: v1
kind: Secret
metadata:
  name: wp-secret
  namespace: blog-miyaoo
type: Opaque
stringData:
  MYSQL_ROOT_PASSWORD: "REPLACE_ME"
  DB_NAME: "wordpress"
  DB_USER: "wpuser"
  DB_PASSWORD: "REPLACE_ME"
  DB_HOST: "mysql"
  # https://roots.io/salts/ で生成
  AUTH_KEY: "REPLACE_ME"
  SECURE_AUTH_KEY: "REPLACE_ME"
  LOGGED_IN_KEY: "REPLACE_ME"
  NONCE_KEY: "REPLACE_ME"
  AUTH_SALT: "REPLACE_ME"
  SECURE_AUTH_SALT: "REPLACE_ME"
  LOGGED_IN_SALT: "REPLACE_ME"
  NONCE_SALT: "REPLACE_ME"
