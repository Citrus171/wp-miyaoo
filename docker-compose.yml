services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  wordpress:
    build: .
    restart: always
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/var/www/html
    environment:
      WP_ENV: development
      WP_HOME: http://localhost:8082
      WP_SITEURL: http://localhost:8082/wp

  nginx:
    image: nginx:alpine
    restart: always
    depends_on:
      - wordpress
    ports:
      - "8082:80"
    volumes:
      - .:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf

  node:
    image: node:22-alpine
    working_dir: /var/www/html/web/app/themes/my-themepro
    volumes:
      - .:/var/www/html
    command: sh -c "npm install && npm run dev"
    profiles:
      - frontend

  phpmyadmin:
    image: phpmyadmin:latest
    restart: always
    depends_on:
      - db
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: ${DB_USER}
      PMA_PASSWORD: ${DB_PASSWORD}

volumes:
  db_data:
